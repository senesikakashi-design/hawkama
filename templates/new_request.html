<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب جديد - نظام الحوكمة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'sidebar.html' %}
    
    <div class="main-content">
        <div class="page-header">
            <h1>➕ طلب جديد</h1>
            <p>إنشاء طلب خدمة جديد</p>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="{{ url_for('new_request') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">نوع الطلب</label>
                            <select class="form-select" name="request_type" required>
                                <option value="">اختر النوع...</option>
                                <option value="technical">دعم فني</option>
                                <option value="maintenance">صيانة</option>
                                <option value="service">خدمة</option>
                                <option value="complaint">شكوى</option>
                                <option value="other">أخرى</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">الأولوية</label>
                            <select class="form-select" name="priority" required>
                                <option value="low">منخفضة</option>
                                <option value="medium" selected>متوسطة</option>
                                <option value="high">عالية</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">العنوان</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">الوصف</label>
                        <textarea class="form-control" name="description" rows="4"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane ms-2"></i>
                        إرسال الطلب
                    </button>
                    <a href="{{ url_for('requests') }}" class="btn btn-secondary">
                        <i class="fas fa-times ms-2"></i>
                        إلغاء
                    </a>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
