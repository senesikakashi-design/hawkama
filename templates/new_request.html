<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'sidebar.html' %}
    
    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="page-header">
            <h1>➕ طلب جديد</h1>
            <p>إنشاء طلب خدمة جديد</p>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('new_request') }}">
                            <div class="mb-3">
                                <label class="form-label">نوع الطلب <span class="text-danger">*</span></label>
                                <select class="form-select" name="request_type" required>
                                    <option value="">-- اختر نوع الطلب --</option>
                                    {% for rt in request_types %}
                                    <option value="{{ rt.type_name }}">{{ rt.type_name_ar }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <!-- ✅✅✅ جديد: اختيار القسم -->
                            <div class="mb-3">
                                <label class="form-label">القسم <span class="text-danger">*</span></label>
                                <select class="form-select" name="department" required>
                                    <option value="">-- اختر القسم --</option>
                                    {% for dept in departments %}
                                    <option value="{{ dept.dept_name }}">{{ dept.dept_name_ar }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">العنوان <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="title" required placeholder="عنوان الطلب">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">الوصف</label>
                                <textarea class="form-control" name="description" rows="4" placeholder="وصف تفصيلي للطلب"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">الأولوية</label>
                                <select class="form-select" name="priority">
                                    <option value="low">منخفضة</option>
                                    <option value="medium" selected>متوسطة</option>
                                    <option value="high">عالية</option>
                                    <option value="urgent">عاجلة</option>
                                </select>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane ms-2"></i>
                                    إرسال الطلب
                                </button>
                                <a href="{{ url_for('requests') }}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-right ms-2"></i>
                                    رجوع
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
